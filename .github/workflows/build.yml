name: Build Flutter Android App

# This tells GitHub to run the build every time you push an update
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checks out your repository's code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Sets up the correct Java version for Android
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 3: Sets up the Flutter environment
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # Step 4: Installs your app's dependencies
      - name: Install Flutter dependencies
        run: flutter pub get

      # Step 5: Builds the final, releasable APK file
      - name: Build APK
        run: flutter build apk --release

      # Step 6: Uploads the finished APK so you can download it
      - name: Upload APK as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk